name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Энд 'working-directory' зааж өгснөөр pom.xml-ийг зөв хавтаснаас уншина
    - name: Build with Maven
      run: mvn -B package
      working-directory: ./flashcard-system

    # Багшийн шаардлага: mvn site амжилттай ажиллах ёстой
    - name: Run Maven Site
      run: mvn site
      working-directory: ./flashcard-system

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        # Энд бас хавтасаа зааж өгөх хэрэгтэй
        directory: ./flashcard-system
